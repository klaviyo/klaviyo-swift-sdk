# Automatically publish to CocoaPods when a GitHub release is published
#
# This workflow publishes all five podspecs in dependency order:
# 1. KlaviyoCore (foundation, no dependencies)
# 2. KlaviyoSwiftExtension (depends on KlaviyoCore)
# 3. KlaviyoSwift (depends on KlaviyoCore)
# 4. KlaviyoForms (depends on KlaviyoSwift)
# 5. KlaviyoLocation (depends on KlaviyoSwift)

name: Publish to CocoaPods

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 5.1.1)'
        required: true
        type: string

jobs:
  publish:
    name: Publish Podspecs to CocoaPods Trunk
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.event.inputs.version || github.ref }}

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install CocoaPods
        run: gem install cocoapods

      - name: Validate podspecs
        run: |
          echo "Validating all podspecs in dependency order..."
          pod lib lint KlaviyoCore.podspec --allow-warnings
          pod lib lint KlaviyoSwiftExtension.podspec --allow-warnings --include-podspecs='*.podspec'
          pod lib lint KlaviyoSwift.podspec --allow-warnings --include-podspecs='*.podspec'
          pod lib lint KlaviyoForms.podspec --allow-warnings --include-podspecs='*.podspec'
          pod lib lint KlaviyoLocation.podspec --allow-warnings --include-podspecs='*.podspec'
          echo "✅ All podspecs are valid"

      - name: Publish to CocoaPods Trunk
        env:
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
        run: |
          set -e  # Exit immediately if any command fails

          # Function to wait for a pod to be available in CocoaPods trunk
          wait_for_pod_availability() {
            local pod_name=$1
            local version=$2
            local max_attempts=30  # 30 attempts * 1min = 30 minutes max
            local attempt=1

            echo "⏳ Waiting for $pod_name $version to be available in CocoaPods trunk..."

            while [ $attempt -le $max_attempts ]; do
              echo "  Attempt $attempt/$max_attempts: Checking availability..."

              # Update local repo to get latest specs
              pod repo update trunk > /dev/null 2>&1 || true

              # Check if the specific version is available
              if pod spec cat "$pod_name" 2>/dev/null | grep -q "\"version\": \"$version\""; then
                echo "  ✅ $pod_name $version is now available!"
                return 0
              fi

              if [ $attempt -lt $max_attempts ]; then
                echo "  ⏳ Not available yet, waiting 1 minute..."
                sleep 60
              fi

              attempt=$((attempt + 1))
            done

            echo "  ❌ Timeout: $pod_name $version not available after 30 minutes"
            return 1
          }

          # Extract version from release tag or input and strip 'v' prefix if present
          VERSION="${{ github.event.release.tag_name || github.event.inputs.version }}"
          VERSION="${VERSION#v}"  # Remove leading 'v' if present
          echo "Publishing podspecs version $VERSION to CocoaPods trunk..."

          # Publish a podspec only if the version isn't already on trunk.
          # This makes the workflow safe to re-run after a partial failure.
          publish_pod() {
            local podspec=$1
            local pod_name=$2
            if pod trunk info "$pod_name" 2>/dev/null | grep -qe "- $VERSION ("; then
              echo "⏭️  $pod_name $VERSION already published, skipping"
            else
              echo "📦 Publishing $pod_name..."
              pod trunk push "$podspec" --allow-warnings
            fi
          }

          # Publish in dependency order with polling for CDN propagation
          publish_pod KlaviyoCore.podspec KlaviyoCore
          wait_for_pod_availability "KlaviyoCore" "$VERSION"

          publish_pod KlaviyoSwiftExtension.podspec KlaviyoSwiftExtension

          publish_pod KlaviyoSwift.podspec KlaviyoSwift
          wait_for_pod_availability "KlaviyoSwift" "$VERSION"

          publish_pod KlaviyoForms.podspec KlaviyoForms

          publish_pod KlaviyoLocation.podspec KlaviyoLocation

          echo "✅ All podspecs published successfully"

      - name: Send Slack notification on success
        if: success()
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            text: "✅ CocoaPods Release Published"
            blocks:
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "✅ *CocoaPods Release Published*"
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "*Version:* `${{ github.event.release.tag_name || github.event.inputs.version }}`\n*Repository:* ${{ github.repository }}\n*Trigger:* ${{ github.event_name == 'release' && 'Automatic (GitHub Release)' || 'Manual (Workflow Dispatch)' }}\n*Published Podspecs:*\n• KlaviyoCore\n• KlaviyoSwiftExtension\n• KlaviyoSwift\n• KlaviyoForms\n• KlaviyoLocation"
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "${{ github.event.release.html_url && format('*Release:* <{0}|View Release>\n', github.event.release.html_url) || '' }}*Workflow:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Workflow>"

      - name: Send Slack notification on failure
        if: failure()
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            text: "❌ CocoaPods Release Failed"
            blocks:
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "❌ *CocoaPods Release Failed*"
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "*Version:* `${{ github.event.release.tag_name || github.event.inputs.version }}`\n*Repository:* ${{ github.repository }}\n*Error:* Failed to publish one or more podspecs to CocoaPods trunk"
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "*Workflow Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Details>"
